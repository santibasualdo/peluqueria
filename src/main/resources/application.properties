spring.application.name=turnero-peluqueria

spring.datasource.url=${SUPABASE_DB_URL:${DB_URL:jdbc:postgresql://localhost:5432/turnero_peluqueria}}
spring.datasource.username=${SUPABASE_DB_USER:${DB_USER:postgres}}
spring.datasource.password=${SUPABASE_DB_PASSWORD:${DB_PASSWORD:postgres}}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=${SUPABASE_DB_URL:${DB_URL:jdbc:postgresql://localhost:5432/turnero_peluqueria}}
spring.flyway.user=${SUPABASE_DB_USER:${DB_USER:postgres}}
spring.flyway.password=${SUPABASE_DB_PASSWORD:${DB_PASSWORD:postgres}}

whatsapp.webhook.verify-token=${WHATSAPP_WEBHOOK_VERIFY_TOKEN:turnero-whatsapp-token}
whatsapp.booking.peluqueria-id=${WHATSAPP_BOOKING_PELUQUERIA_ID:1}
whatsapp.booking.peluquero-id=${WHATSAPP_BOOKING_PELUQUERO_ID:1}
whatsapp.booking.servicio-id=${WHATSAPP_BOOKING_SERVICIO_ID:1}
whatsapp.booking.intervalo-minutos=${WHATSAPP_BOOKING_INTERVALO_MINUTOS:30}
