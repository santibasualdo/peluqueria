spring.application.name=turnero-peluqueria

spring.datasource.url=${SUPABASE_DB_URL:${DB_URL:jdbc:postgresql://localhost:5432/turnero_peluqueria}}
spring.datasource.username=${SUPABASE_DB_USER:${DB_USER:}}
spring.datasource.password=${SUPABASE_DB_PASSWORD:${DB_PASSWORD:}}

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.keepalive-time=300000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.maximum-pool-size=10

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=${SUPABASE_DB_URL:${DB_URL:jdbc:postgresql://localhost:5432/turnero_peluqueria}}
spring.flyway.user=${SUPABASE_DB_USER:${DB_USER:}}
spring.flyway.password=${SUPABASE_DB_PASSWORD:${DB_PASSWORD:}}

whatsapp.webhook.verify-token=${WHATSAPP_WEBHOOK_VERIFY_TOKEN:}
whatsapp.webhook.app-secret=${WHATSAPP_WEBHOOK_APP_SECRET:}
whatsapp.traceability.admin-token=${WHATSAPP_TRACEABILITY_ADMIN_TOKEN:}
security.admin.username=${ADMIN_USERNAME:}
security.admin.password=${ADMIN_PASSWORD:}
whatsapp.booking.peluqueria-id=${WHATSAPP_BOOKING_PELUQUERIA_ID:1}
whatsapp.booking.peluquero-id=${WHATSAPP_BOOKING_PELUQUERO_ID:1}
whatsapp.booking.servicio-id=${WHATSAPP_BOOKING_SERVICIO_ID:1}
whatsapp.booking.intervalo-minutos=${WHATSAPP_BOOKING_INTERVALO_MINUTOS:30}
whatsapp.conversation.inactivity-timeout-minutes=${WHATSAPP_CONVERSATION_INACTIVITY_TIMEOUT_MINUTES:30}
whatsapp.reminders.enabled=${WHATSAPP_REMINDERS_ENABLED:true}
whatsapp.reminders.lead-minutes=${WHATSAPP_REMINDERS_LEAD_MINUTES:180}
whatsapp.reminders.fixed-delay-ms=${WHATSAPP_REMINDERS_FIXED_DELAY_MS:300000}
whatsapp.cloud-api.base-url=${WHATSAPP_CLOUD_API_BASE_URL:https://graph.facebook.com/v22.0}
whatsapp.cloud-api.phone-number-id=${WHATSAPP_CLOUD_API_PHONE_NUMBER_ID:}
whatsapp.cloud-api.access-token=${WHATSAPP_CLOUD_API_ACCESS_TOKEN:}
