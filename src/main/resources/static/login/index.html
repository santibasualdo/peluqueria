<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingreso | Turnero Peluqueria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/login/login.css">
</head>
<body>
<main class="login-layout">
    <section class="login-panel">
        <div class="brand-mark" aria-hidden="true">✂</div>
        <p class="eyebrow">Portal de gestion</p>
        <h1>Turnero Peluqueria</h1>
        <p class="intro">
            Ingresa para administrar turnos, clientes y conversaciones de WhatsApp desde un solo lugar.
        </p>

        <div class="login-feedback" id="login-feedback" hidden></div>

        <form class="login-form" id="login-form" method="post" action="/login">
            <label class="field">
                <span>Usuario</span>
                <input type="text" name="username" autocomplete="username" required placeholder="Telefono del peluquero">
            </label>

            <label class="field">
                <span>Contrasena</span>
                <div class="password-field">
                    <input type="password" id="password" name="password" autocomplete="current-password" required placeholder="Contrasena inicial o personalizada">
                    <button type="button" class="toggle-password" id="toggle-password" aria-label="Mostrar contrasena" aria-pressed="false">
                        Ver
                    </button>
                </div>
            </label>

            <button type="submit" class="submit-button">
                Entrar
                <span aria-hidden="true">→</span>
            </button>
        </form>
    </section>
</main>

<script src="/login/login.js" defer></script>
</body>
</html>
